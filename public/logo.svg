<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bd9f57" />
      <stop offset="50%" stop-color="#dfc685" />
      <stop offset="100%" stop-color="#9a7f3f" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3" flood-color="#000"/>
    </filter>
  </defs>
  
  <g transform="translate(400, 160)" fill="url(#gold)" filter="url(#shadow)">
    <!-- The "A" -->
    <text x="-50" y="50" font-family="'Cinzel', 'Times New Roman', serif" font-size="160" font-weight="bold" text-anchor="middle" letter-spacing="-10">A</text>
    
    <!-- The "R" overlapping -->
    <text x="30" y="50" font-family="'Cinzel', 'Times New Roman', serif" font-size="160" font-weight="bold" text-anchor="middle" letter-spacing="-10">R</text>

    <!-- The Scale Bar -->
    <path d="M-150 -10 Q 0 -40 150 -10" fill="none" stroke="url(#gold)" stroke-width="3" />
    
    <!-- Left Scale Plate -->
    <path d="M-150 -10 L -170 40 L -130 40 Z" fill="none" stroke="url(#gold)" stroke-width="1.5" />
    <path d="M-170 40 Q -150 55 -130 40 Z" fill="url(#gold)" />
    
    <!-- Right Scale Plate -->
    <path d="M150 -10 L 130 40 L 170 40 Z" fill="none" stroke="url(#gold)" stroke-width="1.5" />
    <path d="M130 40 Q 150 55 170 40 Z" fill="url(#gold)" />
  </g>
  
  <!-- ALINE RODRIGUES -->
  <text x="400" y="300" font-family="'Cinzel', 'Times New Roman', serif" font-size="48" font-weight="400" text-anchor="middle" fill="#555" letter-spacing="4">ALINE RODRIGUES</text>
  
  <!-- ADVOCACIA E CONSULTORIA -->
  <text x="400" y="340" font-family="'Montserrat', 'Century Gothic', sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="url(#gold)" letter-spacing="8">ADVOCACIA E CONSULTORIA</text>
</svg>
